<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor de Conversación</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f13;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      background: #1a1a22;
      border-bottom: 1px solid #2a2a36;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #c0c0d0;
    }

    #status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #555;
      transition: background 0.4s;
    }

    #status-dot.connected { background: #4ade80; }
    #status-dot.disconnected { background: #f87171; }

    main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Transcripción (60%) ── */
    #transcription-panel {
      flex: 0 0 60%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #2a2a36;
      overflow: hidden;
    }

    #transcription-panel h2 {
      padding: 14px 20px;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #666;
      border-bottom: 1px solid #2a2a36;
      flex-shrink: 0;
    }

    #transcription-text {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      font-size: 1rem;
      line-height: 1.7;
      color: #d0d0e0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #transcription-text::-webkit-scrollbar { width: 6px; }
    #transcription-text::-webkit-scrollbar-track { background: transparent; }
    #transcription-text::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    /* ── Semáforo (40%) ── */
    #semaphore-panel {
      flex: 0 0 40%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 40px 24px;
    }

    #semaphore-panel h2 {
      position: absolute;
      top: 0;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #666;
    }

    #semaphore-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    #semaphore-circle {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 60px rgba(74, 222, 128, 0.5);
      transition: background 0.6s ease, box-shadow 0.6s ease;
    }

    #semaphore-circle.verde {
      background: #4ade80;
      box-shadow: 0 0 60px rgba(74, 222, 128, 0.5);
    }

    #semaphore-circle.amarillo {
      background: #facc15;
      box-shadow: 0 0 60px rgba(250, 204, 21, 0.5);
    }

    #semaphore-circle.rojo {
      background: #f87171;
      box-shadow: 0 0 60px rgba(248, 113, 113, 0.5);
    }

    #estado-label {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #4ade80;
      transition: color 0.6s ease;
    }

    #estado-label.verde  { color: #4ade80; }
    #estado-label.amarillo { color: #facc15; }
    #estado-label.rojo   { color: #f87171; }

    #razon-text {
      font-size: 0.95rem;
      color: #888;
      text-align: center;
      max-width: 280px;
      line-height: 1.5;
      min-height: 48px;
      transition: opacity 0.4s;
    }

    #next-eval {
      font-size: 0.75rem;
      color: #444;
      letter-spacing: 0.05em;
    }

    footer {
      padding: 8px 24px;
      background: #1a1a22;
      border-top: 1px solid #2a2a36;
      font-size: 0.72rem;
      color: #444;
      display: flex;
      gap: 24px;
    }
  </style>
</head>
<body>

<header>
  <div id="status-dot" class="disconnected"></div>
  <h1>Monitor de Conversación</h1>
</header>

<main>
  <!-- Columna izquierda: transcripción -->
  <section id="transcription-panel">
    <h2>Transcripción en tiempo real</h2>
    <div id="transcription-text">Esperando audio...</div>
  </section>

  <!-- Columna derecha: semáforo -->
  <section id="semaphore-panel">
    <div id="semaphore-container">
      <div id="semaphore-circle" class="verde"></div>
      <div id="estado-label" class="verde">Verde</div>
      <div id="razon-text">Sin datos todavía</div>
      <div id="next-eval">Próxima evaluación en <span id="countdown">5</span>s</div>
    </div>
  </section>
</main>

<footer>
  <span>Voxtral: <span id="voxtral-url">ws://localhost:8000</span></span>
  <span>Qwen: <span id="qwen-url">http://localhost:8001</span></span>
  <span>Intervalo evaluación: <span id="eval-interval">5</span>s</span>
</footer>

<script>
  // ── Configuración ──────────────────────────────────────────
  const VOXTRAL_WS_URL  = window.VOXTRAL_WS_URL  || 'ws://localhost:8000/v1/audio/transcriptions/ws';
  const QWEN_API_URL    = window.QWEN_API_URL     || 'http://localhost:8001/v1/chat/completions';
  const EVAL_INTERVAL_S = window.EVAL_INTERVAL_S  || 5;   // segundos entre evaluaciones

  // ── Estado ─────────────────────────────────────────────────
  let accumulatedText = '';
  let ws = null;
  let countdown = EVAL_INTERVAL_S;

  // ── Referencias DOM ────────────────────────────────────────
  const statusDot      = document.getElementById('status-dot');
  const transcriptionEl = document.getElementById('transcription-text');
  const circleEl       = document.getElementById('semaphore-circle');
  const estadoEl       = document.getElementById('estado-label');
  const razonEl        = document.getElementById('razon-text');
  const countdownEl    = document.getElementById('countdown');

  document.getElementById('voxtral-url').textContent = VOXTRAL_WS_URL;
  document.getElementById('qwen-url').textContent    = QWEN_API_URL;
  document.getElementById('eval-interval').textContent = EVAL_INTERVAL_S;

  // ── WebSocket → Voxtral ────────────────────────────────────
  function connectWebSocket() {
    statusDot.className = 'disconnected';
    ws = new WebSocket(VOXTRAL_WS_URL);

    ws.onopen = () => {
      statusDot.className = 'connected';
      console.log('[WS] Conectado a Voxtral');
    };

    ws.onmessage = (event) => {
      let data;
      try { data = JSON.parse(event.data); } catch { return; }

      // Formato compatible con OpenAI streaming transcription
      const chunk = data?.text || data?.delta?.text || data?.choices?.[0]?.delta?.content || '';
      if (!chunk) return;

      accumulatedText += chunk;
      transcriptionEl.textContent = accumulatedText;
      // Auto-scroll al final
      transcriptionEl.scrollTop = transcriptionEl.scrollHeight;
    };

    ws.onerror = (err) => {
      console.error('[WS] Error:', err);
      statusDot.className = 'disconnected';
    };

    ws.onclose = () => {
      statusDot.className = 'disconnected';
      console.warn('[WS] Desconectado. Reintentando en 5s...');
      setTimeout(connectWebSocket, 5000);
    };
  }

  // ── Evaluador → Qwen ───────────────────────────────────────
  const SYSTEM_PROMPT = `Eres un evaluador de conversaciones. Analiza el texto y clasifica el estado de la conversación.
Responde SIEMPRE con un JSON válido con esta estructura exacta:
{"estado": "verde" | "amarillo" | "rojo", "razon": "Explicación breve en una frase"}

Criterios:
- verde: conversación normal, tono adecuado, sin palabras inapropiadas
- amarillo: tono elevado, lenguaje límite, posible tensión, frases ambiguas
- rojo: insultos, amenazas, lenguaje claramente inapropiado, conversación que debe detenerse

No incluyas nada más en tu respuesta, solo el JSON.`;

  async function evaluateConversation() {
    const text = accumulatedText.trim();
    if (!text) return;

    try {
      const response = await fetch(QWEN_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'Qwen/Qwen2.5-7B-Instruct',
          messages: [
            { role: 'system', content: SYSTEM_PROMPT },
            { role: 'user',   content: `Texto de la conversación:\n\n${text}` }
          ],
          max_tokens: 128,
          temperature: 0.1
        })
      });

      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      const data = await response.json();
      const raw = data?.choices?.[0]?.message?.content || '';

      // Extraer JSON de la respuesta
      const match = raw.match(/\{[\s\S]*\}/);
      if (!match) throw new Error('No JSON en respuesta');

      const result = JSON.parse(match[0]);
      updateSemaphore(result.estado, result.razon);
    } catch (err) {
      console.error('[Evaluador] Error:', err);
    }
  }

  function updateSemaphore(estado, razon) {
    const estados = ['verde', 'amarillo', 'rojo'];
    if (!estados.includes(estado)) return;

    circleEl.className = estado;
    estadoEl.className = estado;
    estadoEl.textContent = estado.charAt(0).toUpperCase() + estado.slice(1);
    razonEl.style.opacity = '0';
    setTimeout(() => {
      razonEl.textContent = razon || '';
      razonEl.style.opacity = '1';
    }, 200);
  }

  // ── Countdown + evaluación periódica ──────────────────────
  setInterval(() => {
    countdown--;
    countdownEl.textContent = countdown;
    if (countdown <= 0) {
      countdown = EVAL_INTERVAL_S;
      evaluateConversation();
    }
  }, 1000);

  // ── Arranque ───────────────────────────────────────────────
  connectWebSocket();
</script>
</body>
</html>
