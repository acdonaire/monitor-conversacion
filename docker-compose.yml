version: '3.8'

services:
  vllm-voxtral:
    build: ./vllm-voxtral
    ports:
      - "8000:8000"
    environment:
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - hf_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]

  vllm-qwen:
    build: ./vllm-qwen
    ports:
      - "8001:8001"
    environment:
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - hf_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]

  dashboard:
    build: ./dashboard
    ports:
      - "80:80"
    depends_on:
      - vllm-voxtral
      - vllm-qwen

volumes:
  hf_cache:
